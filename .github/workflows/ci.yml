name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (with dev + server extras)
        run: pip install -e ".[dev,server]"
      - name: Run tests
        run: pytest -q
      - name: Smoke-test the CLI (offline)
        run: |
          python -m sanguine train --generations 3 --population 6 --cv 3 --md report.md --json report.json -o model.pkl
          test -f model.pkl && test -f report.md
          python -m sanguine predict --model model.pkl --features 2,12,3000,30
          python -m sanguine leaderboard --generations 2 --population 6 --cv 3
      - name: Import the API
        run: python -c "import sanguine.service.api as a; print('api import OK')"

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t sanguine:ci .
